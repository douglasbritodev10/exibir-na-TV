<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAINEL DE EXPEDIÇÃO - SIMONETTI</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <style>
        :root { 
            --primary: #b71c1c; --secondary: #d32f2f; --bg: #fdf2f2;
            --white: #ffffff;
            --finalizado: #1b5e20; --separacao: #e65100; --criado: #0d47a1; 
            --carregamento: #95e9ae; --viagem: #d123a3; --conf-finalizada: #4a148c;
        }
        
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            overflow: hidden; 
            height: 100vh;
        }

        header { 
            background: var(--primary); 
            color: white; 
            padding: 10px 25px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        .header-info { display: flex; align-items: center; gap: 20px; }
        .clock { font-size: 22px; font-weight: bold; background: rgba(0,0,0,0.2); padding: 5px 15px; border-radius: 5px; }

        .main-layout {
            display: grid;
            grid-template-columns: 74% 25%;
            height: calc(100vh - 65px);
            gap: 15px;
            padding: 15px;
            box-sizing: border-box;
        }

        .table-section {
            background: var(--white);
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .table-header-fixed {
            background: var(--primary);
            display: grid;
            grid-template-columns: 10% 10% 12% 18% 14% 8% 28%;
            padding: 15px 0;
            font-weight: bold;
            color: white;
            text-transform: uppercase;
            font-size: 13px;
            text-align: center;
        }

        #scrollContainer {
            flex-grow: 1;
            overflow-y: hidden;
            position: relative;
        }

        .row {
            display: grid;
            grid-template-columns: 10% 10% 12% 18% 14% 8% 28%;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
            align-items: center;
            font-size: 15px;
            text-align: center;
            font-weight: bold;
            color: #444;
        }

        .row:nth-child(even) { background: #fff8f8; }

        .side-panel { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            height: 100%;
        }

        .kpi-box {
            background: var(--white);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            border-bottom: 4px solid var(--primary);
        }
        .kpi-box span { font-size: 12px; color: #777; font-weight: bold; }
        .kpi-box h2 { margin: 5px 0 0; font-size: 30px; color: var(--primary); }

        .chart-card {
            background: var(--white);
            padding: 15px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            min-height: 0;
        }

        /* Proporções dos Cards */
        .pizza-size { flex: 1.8; } /* Maior para caber as legendas */
        .bar-size { flex: 1.2; }   /* Menor para equilibrar */

        .chart-card h3 { 
            font-size: 13px; 
            margin: 0 0 10px 0; 
            color: var(--primary); 
            text-align: center; 
            border-bottom: 1px solid #eee; 
            padding-bottom: 5px;
            font-weight: bold;
        }

        .chart-container { width: 100%; flex-grow: 1; position: relative; min-height: 0; }

        .badge {
            padding: 6px 10px;
            border-radius: 4px;
            color: white;
            font-size: 11px;
            display: inline-block;
            width: 90%;
        }
        .st-FINALIZADO { background: var(--finalizado); }
        .st-EM_SEPARAÇÃO { background: var(--separacao); }
        .st-EM_CARREGAMENTO { background: var(--carregamento); color: #000; }
        .st-CONFERÊNCIA_FINALIZADA { background: var(--conf-finalizada); }
        .st-CARREGADO_EM_VIAGEM { background: var(--viagem); }
        .st-CRIADO { background: var(--criado); }
    </style>
</head>
<body>

<header>
    <div class="header-info">
        <h1 style="margin:0; font-size: 24px;">EXPEDIÇÃO DO DIA</h1>
        <div class="clock" id="relogio">00:00:00</div>
    </div>
    <div id="txtKpiResumo" style="font-weight: bold; font-size: 18px;">VEÍCULOS: 0</div>
</header>

<div class="main-layout">
    <div class="table-section">
        <div class="table-header-fixed">
            <div>DATA</div>
            <div>EXP</div>
            <div>PLACA</div>
            <div>VEÍCULO</div>
            <div>DESTINO</div>
            <div>BOX</div>
            <div>STATUS</div>
        </div>
        <div id="scrollContainer">
            <div id="corpoTabela"></div>
        </div>
    </div>

    <div class="side-panel">
        <div class="kpi-box">
            <span>Total de Expedições</span>
            <h2 id="kpiExpedicoes">0</h2>
        </div>
        <div class="chart-card pizza-size">
            <h3>STATUS DAS EXPEDIÇÕES</h3>
            <div class="chart-container"><canvas id="chartStatus"></canvas></div>
        </div>
        <div class="chart-card bar-size">
            <h3>TIPOS DE VEÍCULOS</h3>
            <div class="chart-container"><canvas id="chartVeiculos"></canvas></div>
        </div>
    </div>
</div>

<script type="module" src="js/painel-tv.js"></script>
</body>
</html>
