<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAINEL EM TEMPO REAL - SIMONETTI</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        :root { 
            --primary: #b71c1c; --secondary: #d32f2f; --bg: #121212;
            --card: #1e1e1e; --text: #ffffff;
            --finalizado: #2e7d32; --separacao: #ef6c00; --criado: #1565c0; 
            --carregamento: #66bb6a; --viagem: #9c27b0; --conf-finalizada: #6a1b9a;
        }
        
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            overflow: hidden; /* Trava o scroll do navegador para usar o interno */
            height: 100vh;
        }

        header { 
            background: var(--primary); 
            padding: 10px 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .logo-area h1 { margin: 0; font-size: 28px; letter-spacing: 2px; }
        .clock { font-size: 24px; font-weight: bold; background: rgba(0,0,0,0.3); padding: 5px 15px; border-radius: 8px; }

        .main-layout {
            display: grid;
            grid-template-columns: 72% 28%;
            height: calc(100vh - 70px);
            gap: 10px;
            padding: 10px;
        }

        /* ÁREA DA TABELA COM AUTO-SCROLL */
        .table-section {
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .table-header-fixed {
            background: #252525;
            display: grid;
            grid-template-columns: 12% 12% 15% 25% 10% 26%;
            padding: 15px 5px;
            font-weight: bold;
            color: var(--secondary);
            text-transform: uppercase;
            font-size: 14px;
            border-bottom: 2px solid #333;
        }

        #scrollContainer {
            flex-grow: 1;
            overflow-y: hidden; /* Scroll controlado via JS */
            position: relative;
        }

        .row {
            display: grid;
            grid-template-columns: 12% 12% 15% 25% 10% 26%;
            padding: 15px 5px;
            border-bottom: 1px solid #333;
            align-items: center;
            font-size: 16px;
        }

        .row:nth-child(even) { background: #222; }

        /* LADO DIREITO: DASHBOARD */
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .kpi-box {
            background: var(--card);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border-left: 6px solid var(--secondary);
        }

        .kpi-box span { font-size: 14px; color: #aaa; text-transform: uppercase; }
        .kpi-box h2 { margin: 5px 0 0; font-size: 36px; color: #fff; }

        .chart-card {
            background: var(--card);
            padding: 15px;
            border-radius: 12px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .chart-card h3 { font-size: 14px; margin: 0 0 10px 0; color: var(--secondary); }
        .chart-container { width: 100%; height: 250px; position: relative; }

        /* STATUS BADGES */
        .badge {
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 12px;
            text-align: center;
            display: inline-block;
        }
        .st-FINALIZADO { background: var(--finalizado); }
        .st-EM_SEPARAÇÃO { background: var(--separacao); }
        .st-EM_CARREGAMENTO { background: var(--carregamento); color: #000; }
        .st-CONFERÊNCIA_FINALIZADA { background: var(--conf-finalizada); }
        .st-CARREGADO_EM_VIAGEM { background: var(--viagem); }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <h1>EXPEDIÇÃO SIMONETTI <span style="font-weight: 300; font-size: 18px;">| MONITORAMENTO</span></h1>
    </div>
    <div id="txtResumo" style="font-weight: bold; color: #ffd700;">CARROS: 0 | HOJE E AMANHÃ</div>
    <div class="clock" id="relogio">00:00:00</div>
</header>

<div class="main-layout">
    <div class="table-section">
        <div class="table-header-fixed">
            <div>DATA</div>
            <div>EXP</div>
            <div>PLACA</div>
            <div>DESTINO</div>
            <div>BOX</div>
            <div>STATUS</div>
        </div>
        <div id="scrollContainer">
            <div id="corpoTabela">
                </div>
        </div>
    </div>

    <div class="side-panel">
        <div class="kpi-box">
            <span>Total de Veículos</span>
            <h2 id="kpiVeiculos">0</h2>
        </div>
        <div class="kpi-box">
            <span>Expedições Ativas</span>
            <h2 id="kpiExp">0</h2>
        </div>

        <div class="chart-card">
            <h3>DISTRIBUIÇÃO DE STATUS</h3>
            <div class="chart-container">
                <canvas id="chartStatus"></canvas>
            </div>
        </div>

        <div class="chart-card">
            <h3>TIPO DE VEÍCULO</h3>
            <div class="chart-container">
                <canvas id="chartVeiculos"></canvas>
            </div>
        </div>
    </div>
</div>

<script type="module" src="js/painel-tv.js"></script>
</body>
</html>
